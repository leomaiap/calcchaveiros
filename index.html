<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaveiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-10 text-center">

    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 hidden transition-all duration-300">
        <span id="toast-text" class="font-bold text-sm"></span>
    </div>

    <div id="modal-confirm" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-xs shadow-2xl">
            <div id="modal-icon" class="text-red-500 mb-4 flex justify-center"><i data-lucide="alert-circle" size="48"></i></div>
            <h3 id="modal-title" class="text-lg font-bold text-center mb-2 font-black uppercase">Atenção</h3>
            <p id="modal-desc" class="text-slate-400 text-sm text-center mb-6 font-bold"></p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="window.closeModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-colors text-xs uppercase">Voltar</button>
                <button id="btn-confirm-delete" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-colors text-xs uppercase tracking-widest">Confirmar</button>
            </div>
        </div>
    </div>

    <header class="bg-slate-900 border-b border-slate-800 px-4 pt-10 pb-12 rounded-b-[3rem]">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="text-left">
                    <h1 class="text-3xl font-black tracking-tighter text-blue-500 uppercase">Chaveiro <span class="text-white">3D</span></h1>
                    <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em]">UFF • Dashboard de Vendas</p>
                </div>
                <div id="sync-indicator" class="text-slate-600">
                    <i data-lucide="refresh-cw" size="18"></i>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-800/40 p-3 rounded-2xl border border-white/5 backdrop-blur-md">
                    <span class="text-[8px] font-black text-slate-500 uppercase block mb-1 tracking-widest text-blue-400">Estoque</span>
                    <span id="display-estoque" class="text-2xl font-black text-white leading-none">--</span>
                </div>
                <div class="bg-slate-800/40 p-3 rounded-2xl border border-white/5 backdrop-blur-md">
                    <span class="text-[8px] font-black text-slate-500 uppercase block mb-1 tracking-widest text-yellow-400">Vendidos</span>
                    <span id="display-vendidos" class="text-2xl font-black text-white leading-none">--</span>
                </div>
                <div class="bg-slate-800/40 p-3 rounded-2xl border border-white/5 backdrop-blur-md">
                    <span class="text-[8px] font-black text-slate-500 uppercase block mb-1 tracking-widest text-green-400">Total R$</span>
                    <span id="display-faturamento" class="text-2xl font-black text-green-400 leading-none">--</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-8 space-y-6">
        
        <section class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800">
            <div class="flex items-center gap-2 mb-6">
                <i data-lucide="zap" class="text-yellow-400" size="18"></i>
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-300">Registrar Venda (Pix)</h2>
            </div>
            <div class="grid grid-cols-3 gap-3" id="vendas-grid"></div>
        </section>

        <section class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800">
            <div class="flex items-center gap-2 mb-5 text-slate-300">
                <i data-lucide="package" class="text-blue-400" size="18"></i>
                <h2 class="text-xs font-black uppercase tracking-widest">Nova Carga</h2>
            </div>
            <div class="flex gap-3">
                <input type="number" id="input-reposicao" value="18" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 text-white font-black text-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="window.handleReposicao()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-8 rounded-2xl shadow-lg active:scale-95 transition-all">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </section>

        <section class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-300">Fluxo Recente</h2>
                <span id="log-count" class="text-[10px] bg-slate-800 px-2 py-1 rounded-md text-slate-500 font-bold uppercase tracking-tighter italic">-- logs</span>
            </div>
            <div id="logs-container" class="space-y-4 max-h-[450px] overflow-y-auto pr-2 scrollbar-hide text-sm text-slate-600">
                Aguardando conexão...
            </div>
            <div class="mt-8 pt-6 border-t border-slate-800 text-center opacity-50">
                <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-1">Carga Histórica Produzida</p>
                <p id="display-total" class="text-lg font-black text-slate-400 italic">--</p>
            </div>
        </section>

        <div class="flex flex-col items-center gap-4 py-8">
            <button onclick="window.askMasterReset()" class="text-[10px] font-black uppercase tracking-[0.2em] text-red-900/50 hover:text-red-600 transition-all flex items-center gap-2">
                <i data-lucide="trash-2" size="12"></i> Master Reset (Zerar Banco)
            </button>
            <p class="text-[9px] font-black text-slate-800 uppercase tracking-[0.3em]">Nexus 3D v3.0 • UFF Management</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhN27-EhwsZ0YZYK4WIu49Bnr9e3RhvHs",
            authDomain: "calc-5d61c.firebaseapp.com",
            projectId: "calc-5d61c",
            storageBucket: "calc-5d61c.firebasestorage.app",
            messagingSenderId: "1036223426623",
            appId: "1:1036223426623:web:5caee5c6f96394c271088a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const appId = 'nexus-3d-uff';
        const PATH = ['artifacts', appId, 'public', 'data', 'logs'];
        
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                startApp();
            } else {
                signInAnonymously(auth);
            }
        });

        function startApp() {
            const logsRef = collection(db, ...PATH);
            
            // ESCUTA E CÁLCULO DINÂMICO
            onSnapshot(logsRef, (snapshot) => {
                let stock = 0;
                let revenue = 0;
                let produced = 0;
                let sold = 0;
                const logsList = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    logsList.push({ id: doc.id, ...data });

                    if (data.tipo === 'VENDA') {
                        stock -= data.qtd;
                        sold += data.qtd; // Acumula unidades vendidas
                        revenue += (data.valor || 0);
                    } else if (data.tipo === 'REPOSICAO') {
                        stock += data.qtd;
                        produced += data.qtd;
                    }
                });

                logsList.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                
                // Update UI
                document.getElementById('display-estoque').innerText = stock;
                document.getElementById('display-vendidos').innerText = sold;
                document.getElementById('display-faturamento').innerText = revenue;
                document.getElementById('display-total').innerText = produced + " unidades";
                document.getElementById('log-count').innerText = logsList.length + " logs";
                
                renderLogs(logsList);
                
                const indicator = document.getElementById('sync-indicator');
                indicator.classList.remove('text-slate-600', 'animate-pulse');
                indicator.classList.add('text-green-500');
            });
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            container.innerHTML = logs.length ? '' : '<p class="py-10 italic">Nenhum registro encontrado.</p>';
            
            logs.forEach(log => {
                const date = log.timestamp?.toDate() ? log.timestamp.toDate().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : '--:--';
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 bg-slate-800/20 p-4 rounded-3xl border border-white/5 mb-3 transition-all active:scale-[0.98]";
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${log.tipo === 'VENDA' ? 'bg-green-500/10 text-green-500' : 'bg-blue-500/10 text-blue-500'}">
                        <i data-lucide="${log.tipo === 'VENDA' ? 'shopping-cart' : 'package'}"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <p class="text-sm font-black">${log.tipo === 'VENDA' ? 'Venda Registrada' : 'Entrada de Carga'}</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">${log.qtd} Unidades • ${date}</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <p class="text-sm font-black ${log.tipo === 'VENDA' ? 'text-green-400' : 'text-blue-400'}">
                            ${log.tipo === 'VENDA' ? `+R$ ${log.valor}` : 'CARGA'}
                        </p>
                        <button onclick="window.askDelete('${log.id}', '${log.tipo}', ${log.qtd})" class="text-slate-700 hover:text-red-500 p-1">
                            <i data-lucide="trash-2" size="14"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        window.handleVenda = async (valor) => {
            if (!currentUser) return;
            const qtd = valor >= 18 ? Math.floor(valor / 6) : Math.floor(valor / 7);
            await addDoc(collection(db, ...PATH), { tipo: 'VENDA', qtd, valor, timestamp: serverTimestamp() });
            showToast(`Venda de ${qtd} un. confirmada!`, "bg-green-600");
        };

        window.handleReposicao = async () => {
            const input = document.getElementById('input-reposicao');
            const qtd = Number(input.value);
            if (qtd <= 0) return;
            await addDoc(collection(db, ...PATH), { tipo: 'REPOSICAO', qtd, timestamp: serverTimestamp() });
            showToast(`Estoque abastecido: +${qtd}`, "bg-blue-600");
            input.value = 18;
        };

        window.askDelete = (id, tipo, qtd) => {
            const modal = document.getElementById('modal-confirm');
            document.getElementById('modal-desc').innerText = `Deseja remover este registro de ${tipo === 'VENDA' ? 'venda' : 'carga'}?`;
            modal.classList.remove('hidden');
            document.getElementById('btn-confirm-delete').onclick = async () => {
                await deleteDoc(doc(db, ...PATH, id));
                window.closeModal();
                showToast("Registro removido!", "bg-slate-700");
            };
        };

        window.askMasterReset = () => {
            const modal = document.getElementById('modal-confirm');
            document.getElementById('modal-desc').innerText = "ATENÇÃO: Isso apagará TODO o histórico e resetará o estoque para ZERO. Não há volta!";
            modal.classList.remove('hidden');
            document.getElementById('btn-confirm-delete').onclick = async () => {
                showToast("Limpando banco...", "bg-red-600");
                const snap = await getDocs(collection(db, ...PATH));
                await Promise.all(snap.docs.map(d => deleteDoc(doc(db, ...PATH, d.id))));
                window.closeModal();
                showToast("Banco zerado!", "bg-green-600");
            };
        };

        window.closeModal = () => document.getElementById('modal-confirm').classList.add('hidden');

        function showToast(text, bgColor) {
            const toast = document.getElementById('toast');
            toast.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 ${bgColor} animate-in fade-in slide-in-from-top-4`;
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        const grid = document.getElementById('vendas-grid');
        [7, 14, 18, 24, 30, 36].forEach(v => {
            const btn = document.createElement('button');
            btn.onclick = () => window.handleVenda(v);
            btn.className = "group relative flex flex-col items-center justify-center bg-slate-800 hover:bg-blue-600 border border-slate-700 py-5 rounded-2xl transition-all active:scale-95";
            btn.innerHTML = `<span class="text-[10px] text-slate-500 group-hover:text-blue-200 font-black mb-1 leading-none italic">R$</span><span class="text-2xl font-black group-hover:text-white leading-none">${v}</span>`;
            if(v >= 18) btn.innerHTML += `<span class="absolute -top-2 left-1/2 -translate-x-1/2 bg-blue-500 text-[8px] font-black px-2 py-0.5 rounded-full text-white shadow-lg uppercase tracking-tighter">Combo</span>`;
            grid.appendChild(btn);
        });
        lucide.createIcons();
    </script>
</body>
</html>
